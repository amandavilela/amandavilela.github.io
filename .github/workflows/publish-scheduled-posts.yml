name: Publish scheduled posts

on:
  schedule:
    - cron: "0 8 * * *" # runs daily at 08:00 UTC
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout gh-pages
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          fetch-depth: 0

      - name: Merge due post PRs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TODAY=$(date -u '+%Y-%m-%d')
          echo "Today is $TODAY"

          gh pr list --base gh-pages --state open \
            --json number,title,headRefName | \
          jq -c '.[] | select(.title | test("^Scheduled post: [0-9]{4}-[0-9]{2}-[0-9]{2}-.+$"))' | \
          while read -r pr; do
            NUMBER=$(echo "$pr" | jq -r '.number')
            BRANCH=$(echo "$pr" | jq -r '.headRefName')
            DATE=$(echo "$pr" | jq -r '.title' | grep -oP '\d{4}-\d{2}-\d{2}')

            if [[ "$DATE" le "$TODAY" ]]; then
              echo "Merging PR #$NUMBER ($BRANCH, scheduled for $DATE)"
              gh pr merge "$NUMBER" --merge --delete-branch
            else
              echo "Skipping PR #$NUMBER ($BRANCH, scheduled for $DATE)"
            fi
          done
